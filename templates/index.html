<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevBot — AI Coding Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a25; --border: #2a2a3a; --accent: #00ffa3; --accent2: #7c6dfa; --text: #e8e8f0; --muted: #6b6b80; --font-mono: 'JetBrains Mono', monospace; --font-display: 'Syne', sans-serif; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; max-width: 800px; padding: 28px 24px 0; display: flex; align-items: center; gap: 14px; }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-text h1 { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
    .header-text span { font-size: 11px; color: var(--muted); }
    .status-dot { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); }
    .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    #chat { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 24px 24px 8px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .message { display: flex; flex-direction: column; gap: 4px; max-width: 88%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot { align-self: flex-start; align-items: flex-start; }
    .msg-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 0 4px; }
    .msg-bubble { padding: 14px 18px; border-radius: 14px; font-size: 13.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; border: 1px solid transparent; }
    .message.user .msg-bubble { background: #1e1e2e; border-color: var(--border); border-bottom-right-radius: 4px; }
    .message.bot .msg-bubble { background: #0f1f1a; border-color: rgba(0,255,163,0.15); border-bottom-left-radius: 4px; }
    .msg-bubble code { background: #0a1a12; color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 12.5px; }
    .msg-bubble pre { background: #080f0c; border: 1px solid rgba(0,255,163,0.12); border-radius: 8px; padding: 14px; overflow-x: auto; margin: 10px 0; font-size: 12px; }
    .msg-bubble pre code { background: none; padding: 0; }
    .typing .msg-bubble { display: flex; align-items: center; gap: 5px; padding: 16px 20px; }
    .typing-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; opacity: 0.4; animation: blink 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .suggestions { width: 100%; max-width: 800px; padding: 0 24px; display: flex; gap: 8px; flex-wrap: wrap; }
    .suggestion-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: var(--font-mono); font-size: 11.5px; padding: 7px 13px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
    .suggestion-btn:hover { border-color: var(--accent); color: var(--accent); }
    .input-area { width: 100%; max-width: 800px; padding: 16px 24px 28px; }
    .input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: rgba(0,255,163,0.4); }
    #user-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 13.5px; resize: none; max-height: 140px; line-height: 1.6; padding: 4px 0; }
    #user-input::placeholder { color: var(--muted); }
    #send-btn { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #00cc82); border: none; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    #send-btn:hover { transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-hint { font-size: 10.5px; color: var(--muted); margin-top: 8px; text-align: center; }
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 40px 24px; gap: 12px; }
    .welcome h2 { font-family: var(--font-display); font-size: 26px; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .welcome p { color: var(--muted); font-size: 13px; max-width: 380px; line-height: 1.6; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <header>
    <div class="logo">⚡</div>
    <div class="header-text"><h1>DevBot</h1><span>AI Coding Assistant</span></div>
    <div class="status-dot"><div class="dot"></div>online</div>
  </header>
  <div id="chat">
    <div class="welcome" id="welcome">
      <div style="font-size:42px">👾</div>
      <h2>Ask me anything code-related</h2>
      <p>Explain code, debug errors, review snippets, learn new concepts — I've got you.</p>
    </div>
  </div>
  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="useSuggestion(this)">Explain async/await in JS</button>
    <button class="suggestion-btn" onclick="useSuggestion(this)">Why is my code throwing a NullPointerException?</button>
    <button class="suggestion-btn" onclick="useSuggestion(this)">What's Big O notation?</button>
    <button class="suggestion-btn" onclick="useSuggestion(this)">How do I reverse a linked list?</button>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Ask a coding question or paste your code…"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <p class="input-hint">Shift+Enter for new line · Enter to send</p>
  </div>
  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');
    const suggestionsEl = document.getElementById('suggestions');
    let conversationHistory = [];
    inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px'; });
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    function useSuggestion(btn) { inputEl.value = btn.textContent; suggestionsEl.style.display = 'none'; sendMessage(); }
    function appendMessage(role, text) {
      if (welcome) welcome.style.display = 'none';
      suggestionsEl.style.display = 'none';
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : 'DevBot';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = role === 'bot' ? formatMessage(text) : escapeHtml(text);
      div.appendChild(label); div.appendChild(bubble);
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function appendTyping() {
      const div = document.createElement('div');
      div.className = 'message bot typing'; div.id = 'typing-indicator';
      const label = document.createElement('div'); label.className = 'msg-label'; label.textContent = 'DevBot';
      const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
      bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      div.appendChild(label); div.appendChild(bubble);
      chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
    }
    function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }
    function formatMessage(text) {
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true;
      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });
      appendTyping();
      try {
        const res = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: conversationHistory }) });
        const data = await res.json();
        removeTyping();
        const reply = data.reply || 'Sorry, something went wrong.';
        appendMessage('bot', reply);
        conversationHistory.push({ role: 'assistant', content: reply });
      } catch (err) {
        removeTyping();
        appendMessage('bot', '⚠️ Error connecting to server. Make sure the backend is running.');
      }
      sendBtn.disabled = false; inputEl.focus();
    }
  </script>
</body>
</html>
